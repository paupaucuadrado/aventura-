<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Hydra Sublenguaje</title>
  <script src="https://unpkg.com/hydra-synth"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      background: black;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
    }

    #input {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      max-width: 600px;
      height: 80px;
      background: rgba(0, 0, 0, 0.5);
      color: white;
      font-size: 18px;
      border: 2px solid white;
      border-radius: 10px;
      padding: 10px;
      z-index: 10;
      backdrop-filter: blur(4px);
      resize: none;
    }
  </style>
</head>
<body>
  <textarea id="input" placeholder="Escribe: pabaras y letras cortas"></textarea>

  <script>
    const hydra = new Hydra({ detectAudio: false });

    const palabras = {
  periquin: () => osc(1,0,21).modulate(osc(65,0.50,150)).modulateScale(osc(-85)).modulateKaleid(osc(65),50,10).modulateRotate(voronoi(2,45))
    volando: () => solid(2,0.5,89).layer(osc(85.5,0).thresh(5).luma().modulate(osc(4,1).rotate(1),0.05).color(-0.8,-0.5,20)).layer(osc(85,0).thresh(0.1).luma().modulate(osc(9,0.8).rotate(9),0.1))
por: () => osc().color(0,2,34).kaleid(48).scrollX([-0.2,0.2]).modulatePixelate(voronoi(9)).modulateRotate(osc(-0.02,8,-0.045).kaleid(15).scale(1),3,0)
    el: () => voronoi(-55,0.55,0.3).colorama(2,0.8,3).scale(-0.9,4,6).blend(noise([5,6,2,0],-3),4).colorama().modulateRotate(osc(1,5,2).kaleid(10).scale(-0.2),1).mult(osc([50,2,-100,2],-0.1,3)).modulateHue(o1,3).layer(o0,0.1)
cielo: () => voronoi(5,3,0.2).colorama(89.7502).kaleid(5)
    Y: () => noise(7,0.5,3).add(shape(1)).colorama(.9).modulateRotate(osc(6,0.1,2).kaleid(65).scale(0.2),1,3).modulateScale(osc(50)).invert().mult(voronoi([2,-3,5,1],0.3,1)).
siendo: () => noise(7,0.5,3).add(shape(1)).colorama(.9).modulateRotate(osc(6,0.1,2).kaleid(65).scale(0.2),1,3).modulateScale(osc(50)).invert().pixelate(1589.258)
una: () => voronoi (9,0.58,6).rotate().colorama(0.2).modulatePixelate(osc(0.2,1))
    ave: () => osc(8,0.2896,0.4587).rotate(0,0.5).kaleid().repeat(5).colorama().scrollX(58).add(noise(-0.1))
    feliz: () => shape(7).repeat(3,2).scrollY(0,-0.2).scrollX(0,0.1).color(0.14,5).blend(noise(7,-5)).colorama(0.57).add(shape(2,-0.8965,1)).diff(osc(4,0,-0.2))



magt : () => {
  osc(40,0.5,() => a.fft[0]*200).out(o2)
  let shape = osc(60, 0.1, 2)
    .mult(noise(1, 4))
    .rotate(() => (Math.random() - 0.5) * 0.5 + Math.sin(time * 0.2) * 0.2)
  shape.out(o0)
  return shape
},
};

    const input = document.getElementById("input");

    input.addEventListener("input", () => {
      const texto = input.value.toLowerCase().trim();

      // Si contiene comas: modulación encadenada
      if (texto.includes(",")) {
        const modWords = texto.split(",").map(w => w.trim()).filter(w => palabras[w]);
        if (modWords.length >= 2) {
          let base = palabras[modWords[0]]();
          for (let i = 1; i < modWords.length; i++) {
            base = palabras[modWords[i]]().modulate(base, 0.5 + 0.3 * Math.random()); // modulación aleatoria
          }
          base.out();
          return;
        }
      }

      // Si contiene comas: modulación encadenada
      if (texto.includes("x")) {
        const modWords = texto.split(",").map(w => w.trim()).filter(w => palabras[w]);
        if (modWords.length >= 2) {
          let base = palabras[modWords[0]]();
          for (let i = 1; i < modWords.length; i++) {
            base = palabras[modWords[i]]().modulateScale(base, 0.5 + 0.3 * Math.random()); // modulación aleatoria
          }
          base.out();
          return;
        }
      }

      // Si no hay coma, renderiza todo en capas independientes
      const entradas = texto.split(/\s+/).map(w => w.trim()).filter(w => palabras[w]);
      if (entradas.length > 0) {
        // Componer blend entre todas
        let comp = palabras[entradas[0]]();
        for (let i = 1; i < entradas.length; i++) {
          comp = comp.diff(palabras[entradas[i]](), 0.5);
        }
        comp.out();
      }
    });
  </script>
</body>
</html>
